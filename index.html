<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RUN ROBERT RUN!</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#04060a; touch-action:none; }
  body { font-family:'Segoe UI', system-ui, sans-serif; user-select:none; -webkit-user-select:none; }
  canvas { display:block; width:100%; height:100%; }
  .pad { position:fixed; bottom:20px; display:flex; gap:16px; z-index:10; }
  #padR { right:18px; }
  .btn {
    width:76px; height:76px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, rgba(255,200,90,0.18), rgba(60,40,15,0.3));
    border:1.5px solid rgba(255,200,100,0.5);
    box-shadow:0 0 18px rgba(255,180,60,0.15), inset 0 0 14px rgba(255,180,60,0.1);
    color:rgba(255,225,170,0.95); font-size:13px; font-weight:700; letter-spacing:1.5px;
    display:flex; align-items:center; justify-content:center;
  }
  .btn:active, .btn.held {
    background:radial-gradient(circle at 35% 30%, rgba(255,210,110,0.45), rgba(120,80,25,0.45));
    box-shadow:0 0 26px rgba(255,200,90,0.45);
  }
  #mute {
    position:fixed; top:14px; right:14px; z-index:11;
    width:42px; height:42px; border-radius:10px;
    background:rgba(30,22,10,0.55); border:1px solid rgba(255,200,100,0.35);
    color:rgba(255,225,170,0.9); font-size:18px;
    display:flex; align-items:center; justify-content:center;
  }
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="mute">♪</div>
<div class="pad" id="padR">
  <div class="btn" id="bDuck">DUCK</div>
  <div class="btn" id="bJump">JUMP</div>
</div>

<script>
(() => {
'use strict';
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');

// ============ viewport ============
const VW = 960, VH = 540;
let scale=1, offX=0, offY=0;
function resize() {
  const dpr = Math.min(window.devicePixelRatio||1, 2);
  cv.width = innerWidth*dpr; cv.height = innerHeight*dpr;
  scale = Math.min(cv.width/VW, cv.height/VH);
  offX = (cv.width - VW*scale)/2;
  offY = (cv.height - VH*scale)/2;
}
addEventListener('resize', resize);
resize();

// ============ audio ============
let AC=null, muted=false, masterGain=null, _noise=null;
function audioInit() {
  if (AC || muted) return;
  try {
    AC = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = AC.createGain();
    masterGain.gain.value = 0.35;
    masterGain.connect(AC.destination);
  } catch(e) { AC=null; }
}
function noiseBuf() {
  const b = AC.createBuffer(1, AC.sampleRate*0.5, AC.sampleRate);
  const d = b.getChannelData(0);
  for (let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
  return b;
}
function sfx(type) {
  if (!AC || muted) return;
  if (AC.state==='suspended') AC.resume();
  const t0 = AC.currentTime;
  if (type==='jump') {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle';
    o.frequency.setValueAtTime(220,t0);
    o.frequency.exponentialRampToValueAtTime(520,t0+0.14);
    g.gain.setValueAtTime(0.22,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+0.16);
    o.connect(g).connect(masterGain); o.start(t0); o.stop(t0+0.18);
  } else if (type==='crash') {
    if (!_noise) _noise=noiseBuf();
    const s=AC.createBufferSource(), g=AC.createGain(), f=AC.createBiquadFilter();
    s.buffer=_noise; f.type='lowpass';
    f.frequency.setValueAtTime(1400,t0);
    f.frequency.exponentialRampToValueAtTime(120,t0+0.3);
    g.gain.setValueAtTime(0.45,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+0.32);
    s.connect(f).connect(g).connect(masterGain); s.start(t0); s.stop(t0+0.35);
  } else if (type==='coffee') {
    [523,659,784,1047].forEach((fr,i)=>{
      const o=AC.createOscillator(), g=AC.createGain();
      o.type='sine'; o.frequency.value=fr;
      g.gain.setValueAtTime(0.0001,t0+i*0.05);
      g.gain.exponentialRampToValueAtTime(0.18,t0+i*0.05+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t0+i*0.05+0.1);
      o.connect(g).connect(masterGain); o.start(t0+i*0.05); o.stop(t0+i*0.05+0.12);
    });
  } else if (type==='roar') {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sawtooth';
    o.frequency.setValueAtTime(110,t0);
    o.frequency.exponentialRampToValueAtTime(60,t0+0.4);
    g.gain.setValueAtTime(0.25,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+0.45);
    o.connect(g).connect(masterGain); o.start(t0); o.stop(t0+0.5);
  } else if (type==='donut') {
    const o=AC.createOscillator(), g=AC.createGain();
    o.type='sine';
    o.frequency.setValueAtTime(880,t0);
    g.gain.setValueAtTime(0.18,t0);
    g.gain.exponentialRampToValueAtTime(0.001,t0+0.12);
    o.connect(g).connect(masterGain); o.start(t0); o.stop(t0+0.14);
  }
}
const muteBtn = document.getElementById('mute');
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '✕' : '♪';
  muteBtn.style.opacity = muted ? 0.5 : 1;
});

// ============ glow sprites ============
function makeGlow(color, size) {
  const c = document.createElement('canvas');
  c.width = c.height = size*2;
  const g = c.getContext('2d');
  const rg = g.createRadialGradient(size,size,0,size,size,size);
  rg.addColorStop(0,color);
  rg.addColorStop(0.4,color.replace('1)','0.35)'));
  rg.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle = rg;
  g.fillRect(0,0,size*2,size*2);
  return c;
}
const GLOW = {
  red:    makeGlow('rgba(255,60,50,1)',48),
  green:  makeGlow('rgba(100,255,140,1)',32),
  blue:   makeGlow('rgba(90,160,255,1)',40),
  amber:  makeGlow('rgba(255,190,80,1)',48),
  white:  makeGlow('rgba(240,245,255,1)',56),
};
function glow(img,x,y,s,a) {
  ctx.globalCompositeOperation='lighter';
  ctx.globalAlpha=a;
  ctx.drawImage(img,x-s,y-s,s*2,s*2);
  ctx.globalAlpha=1;
  ctx.globalCompositeOperation='source-over';
}

// ============ input ============
const keys={};
addEventListener('keydown', e=>{
  keys[e.code]=true;
  if (['Space','ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
  if (state!=='play' && (e.code==='Enter'||e.code==='Space')) { audioInit(); startGame(); }
});
addEventListener('keyup', e=>keys[e.code]=false);
const touch = { jump:false, duck:false };
function bindBtn(id, prop) {
  const el = document.getElementById(id);
  const on = e=>{ e.preventDefault(); audioInit(); touch[prop]=true; el.classList.add('held');
    if (state!=='play') startGame(); };
  const off = e=>{ e.preventDefault(); touch[prop]=false; el.classList.remove('held'); };
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on);
  el.addEventListener('mouseup',off);
  el.addEventListener('mouseleave',off);
}
bindBtn('bJump','jump'); bindBtn('bDuck','duck');
cv.addEventListener('touchstart', e=>{ if(state!=='play'){ e.preventDefault(); audioInit(); startGame(); } },{passive:false});
cv.addEventListener('mousedown', ()=>{ if(state!=='play'){ audioInit(); startGame(); } });
const inJump = ()=>keys['Space']||keys['ArrowUp']||keys['KeyW']||touch.jump;
const inDuck = ()=>keys['ArrowDown']||keys['KeyS']||touch.duck;

// ============ state ============
let state='title';
const GROUND=460, GRAV=0.68;
let robert, boss, obstacles, pickups, parts, speed, dist, donuts, best=0, spawnT, shake, t=0, flash, yellT, yellTxt, caughtAnim;

const YELLS = ['GOD DAMN IT!','TEACHABLE MOMENT!!','FUCKING NUMBSKULL!','WHAT THE FUCK ROBERT?!'];

// monitor wall colors (stable per cell, flicker over time)
const MON_COLS = ['#1a3a5c','#36204a','#173f2e','#4a2418','#20364a','#3d1f33','#28411e','#1f2a4d'];

function startGame() {
  robert = { x:250, y:GROUND, vy:0, onGround:true, duck:false, jumps:0, jumpHeld:false,
             stumble:0, h:64, w:30 };
  boss = { lead:210, arm:0, yell:0 };
  obstacles=[]; pickups=[]; parts=[];
  speed=5; dist=0; donuts=0; spawnT=90; shake=0; flash=0;
  yellT=40; yellTxt=''; caughtAnim=0;
  state='play';
}

// ============ spawning ============
function spawnObstacle() {
  const x = VW + 80;
  const r = Math.random();
  if (r < 0.28)      obstacles.push({ type:'chair', x, y:GROUND, w:42, h:54, roll:0 });
  else if (r < 0.5)  obstacles.push({ type:'rack',  x, y:GROUND, w:56, h:78 });
  else if (r < 0.68) obstacles.push({ type:'tapes', x, y:GROUND, w:36, h:38 });
  else if (r < 0.86) obstacles.push({ type:'boom',  x, y:0,      w:90, h:GROUND-52 }); // duck under
  else               obstacles.push({ type:'spill', x, y:GROUND, w:64, h:10 });
  // pickup chance trailing the obstacle
  if (Math.random() < 0.4) {
    const py = Math.random()<0.5 ? GROUND-30 : GROUND-95;
    pickups.push({ type: Math.random()<0.45 ? 'coffee':'donut', x:x+170+Math.random()*120, y:py, t:0 });
  }
}

function boomP(x,y,n,col,spd=3) {
  for (let i=0;i<n;i++) {
    const a=Math.random()*Math.PI*2, s=0.6+Math.random()*spd;
    parts.push({ x,y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-1.2, life:20+Math.random()*22, max:42, col, sz:2+Math.random()*3 });
  }
}

// ============ update ============
function update() {
  t++;
  if (state!=='play') {
    if (state==='over' && caughtAnim < 60) caughtAnim++;
    return;
  }

  // speed ramp
  speed = Math.min(11.5, 5 + dist/900);
  dist += speed/9;

  // ---- robert ----
  robert.duck = inDuck() && robert.onGround;
  robert.h = robert.duck ? 38 : 64;

  if (inJump() && !robert.jumpHeld && (robert.onGround || robert.jumps < 2)) {
    robert.vy = -11.8;
    robert.jumps++;
    robert.onGround = false;
    robert.jumpHeld = true;
    sfx('jump');
    if (robert.jumps===2) boomP(robert.x, robert.y, 6, '#cfe2ff', 1.6);
  }
  if (!inJump()) robert.jumpHeld = false;

  robert.vy += GRAV;
  robert.y += robert.vy;
  if (robert.y >= GROUND) {
    if (!robert.onGround && robert.vy > 5) boomP(robert.x, GROUND, 4, '#7a838f', 1);
    robert.y = GROUND; robert.vy = 0; robert.onGround = true; robert.jumps = 0;
  }
  if (robert.stumble > 0) robert.stumble--;

  // ---- boss pursuit ----
  const drain = 0.04 + speed*0.012;
  if (robert.stumble > 0) boss.lead -= 2.4;
  else boss.lead = Math.min(250, boss.lead + 0.3 - drain);
  boss.arm = boss.lead < 90 ? Math.min(1, boss.arm+0.05) : Math.max(0, boss.arm-0.05);

  if (boss.lead < 26) {
    best = Math.max(best, Math.floor(dist) + donuts*10);
    state = 'over';
    caughtAnim = 0;
    sfx('roar');
    shake = 14;
    return;
  }

  // boss yells every ~2 seconds
  yellT--;
  if (yellT <= 0) {
    let pick;
    do { pick = YELLS[Math.floor(Math.random()*YELLS.length)]; } while (pick === yellTxt && YELLS.length > 1);
    yellTxt = pick;
    boss.yell = 100;
    if (boss.lead < 130) sfx('roar');
    yellT = 120;
  }
  if (boss.yell > 0) boss.yell--;

  // ---- spawning ----
  spawnT--;
  if (spawnT <= 0) {
    spawnObstacle();
    spawnT = (95 - speed*4) + Math.random()*55;
  }

  // ---- obstacles ----
  const eff = robert.stumble > 0 ? speed*0.45 : speed;
  for (let i=obstacles.length-1;i>=0;i--) {
    const o = obstacles[i];
    o.x -= eff;
    if (o.type==='chair') o.roll += eff*0.06;
    if (o.x < -120) { obstacles.splice(i,1); continue; }
    // collision
    if (robert.stumble === 0) {
      const rTop = robert.y - robert.h, rBot = robert.y;
      const rL = robert.x - robert.w/2, rR = robert.x + robert.w/2;
      let hitIt = false;
      if (o.type==='boom') {
        // hangs from ceiling down to o.h; must duck
        if (rR > o.x - o.w/2 && rL < o.x + o.w/2 && rTop < o.h) hitIt = true;
      } else if (o.type==='spill') {
        if (rR > o.x - o.w/2 && rL < o.x + o.w/2 && rBot >= GROUND-2) hitIt = true;
      } else {
        if (rR > o.x - o.w/2 && rL < o.x + o.w/2 && rBot > o.y - o.h && rTop < o.y) hitIt = true;
      }
      if (hitIt) {
        robert.stumble = 50;
        shake = 10; flash = 0.5;
        boomP(robert.x, robert.y - 30, 14, o.type==='spill' ? '#9b6b3f' : '#ffb060');
        sfx('crash');
      }
    }
  }

  // ---- pickups ----
  for (let i=pickups.length-1;i>=0;i--) {
    const p = pickups[i];
    p.t++;
    p.x -= eff;
    if (p.x < -40) { pickups.splice(i,1); continue; }
    const bob = Math.sin(p.t*0.1)*4;
    if (Math.abs(p.x-robert.x)<26 && Math.abs((p.y+bob)-(robert.y-robert.h/2))<48) {
      if (p.type==='coffee') {
        boss.lead = Math.min(250, boss.lead+75);
        boomP(p.x,p.y,12,'#ffd27a',2.5);
        sfx('coffee');
      } else {
        donuts++;
        boomP(p.x,p.y,10,'#ff9fc0',2);
        sfx('donut');
      }
      pickups.splice(i,1);
    }
  }

  // ---- particles ----
  for (let i=parts.length-1;i>=0;i--) {
    const p = parts[i];
    p.x += p.vx - eff*0.4; p.y += p.vy; p.vy += 0.1; p.life--;
    if (p.life<=0) parts.splice(i,1);
  }

  if (shake>0) shake*=0.85;
  if (flash>0) flash-=0.04;
}

// ============ drawing ============
function rr(x,y,w,h,r) {
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(x,y,w,h,r);
  else ctx.rect(x,y,w,h);
  ctx.fill();
}

function drawRoom() {
  // back wall
  const g = ctx.createLinearGradient(0,0,0,VH);
  g.addColorStop(0,'#0a0e16');
  g.addColorStop(0.7,'#121826');
  g.addColorStop(1,'#0a0c12');
  ctx.fillStyle=g;
  ctx.fillRect(0,0,VW,VH);

  // ===== monitor video wall (slow parallax) =====
  const mOff = (dist*2.2) % 84;
  const cellW=78, cellH=48, top=60;
  for (let r=0;r<4;r++) {
    for (let c=-1;c<14;c++) {
      const x = c*84 - mOff, y = top + r*54;
      const idx = (Math.floor(dist*2.2/84)+c)*7 + r*3;
      const flick = Math.sin(t*0.05 + idx*1.7) > 0.92;
      const ai = Math.abs(idx);
      if (ai%4===0) {
        // football game feed: field + yard lines + players
        ctx.fillStyle = flick ? '#2e7a3c' : '#1f5c2c';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle='rgba(255,255,255,0.5)';
        for (let yl=0; yl<5; yl++) ctx.fillRect(x+8+yl*15, y+6, 1.5, cellH-12);
        // two squads of player dots
        ctx.fillStyle='#d8d8e8';
        ctx.fillRect(x+26, y+22, 3, 3); ctx.fillRect(x+30, y+18, 3, 3); ctx.fillRect(x+28, y+28, 3, 3);
        ctx.fillStyle='#d04040';
        ctx.fillRect(x+44, y+21, 3, 3); ctx.fillRect(x+48, y+26, 3, 3); ctx.fillRect(x+46, y+15, 3, 3);
      } else if (ai%9===1) {
        // scoreboard / broadcast graphics feed
        ctx.fillStyle='#0d1018';
        ctx.fillRect(x, y, cellW, cellH);
        ctx.fillStyle='#ffd05a';
        ctx.font='700 11px "Courier New", monospace';
        ctx.fillText('21 - 17', x+14, y+22);
        ctx.fillStyle='rgba(255,255,255,0.4)';
        ctx.fillRect(x+14, y+28, 36, 3);
        const liveOn = Math.floor(t/30)%2===0;
        ctx.fillStyle = liveOn ? '#ff3838' : '#5a1c1c';
        ctx.beginPath(); ctx.arc(x+cellW-14, y+12, 3, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle='rgba(255,120,120,0.8)';
        ctx.font='700 7px "Segoe UI", sans-serif';
        ctx.fillText('LIVE', x+cellW-34, y+15);
      } else {
        const col = MON_COLS[ai%MON_COLS.length];
        ctx.fillStyle = flick ? '#3a4f6e' : col;
        ctx.fillRect(x, y, cellW, cellH);
        // screen content hint
        ctx.fillStyle = 'rgba(255,255,255,0.06)';
        ctx.fillRect(x+6, y+8, cellW-12, 4);
        ctx.fillRect(x+6, y+18, cellW-24, 3);
      }
      if (ai%9===0) { // static screen
        ctx.fillStyle = `rgba(200,210,230,${0.05+Math.random()*0.08})`;
        ctx.fillRect(x,y,cellW,cellH);
      }
      ctx.strokeStyle='rgba(0,0,0,0.6)';
      ctx.lineWidth=2;
      ctx.strokeRect(x,y,cellW,cellH);
    }
  }
  // wall glow from monitors
  ctx.fillStyle='rgba(60,100,160,0.08)';
  ctx.fillRect(0, top, VW, 4*54);

  // ===== ON AIR sign (passes by) =====
  const signX = VW - ((dist*3.2) % (VW*2.4));
  if (signX > -160 && signX < VW+40) {
    const lit = Math.floor(t/40)%2===0;
    ctx.fillStyle='#1a0d0d';
    rr(signX, 18, 130, 34, 6);
    if (lit) glow(GLOW.red, signX+65, 35, 70, 0.5);
    ctx.fillStyle = lit ? '#ff4040' : '#5a1c1c';
    ctx.font='700 20px "Segoe UI", system-ui, sans-serif';
    ctx.textAlign='center';
    ctx.fillText('ON AIR', signX+65, 43);
    ctx.textAlign='left';
  }

  // ===== server racks (mid parallax) =====
  const rOff = (dist*4.5) % 150;
  for (let i=-1;i<8;i++) {
    const x = i*150 - rOff;
    const idx = Math.floor(dist*4.5/150)+i;
    ctx.fillStyle='#161b24';
    ctx.fillRect(x, 292, 96, GROUND-292);
    ctx.fillStyle='#0d1018';
    for (let u=0;u<8;u++) ctx.fillRect(x+6, 300+u*19, 84, 14);
    // blinking LEDs
    for (let u=0;u<8;u++) {
      const on1 = Math.sin(t*0.1 + idx*3 + u*1.3) > 0.3;
      const on2 = Math.sin(t*0.13 + idx*5 + u*2.1) > 0.5;
      ctx.fillStyle = on1 ? '#52ff86' : '#163522';
      ctx.fillRect(x+12, 304+u*19, 4, 4);
      ctx.fillStyle = on2 ? '#ffb340' : '#3a2a12';
      ctx.fillRect(x+20, 304+u*19, 4, 4);
      if (on1) glow(GLOW.green, x+14, 306+u*19, 6, 0.5);
    }
  }

  // ===== ceiling: fluorescents + cable tray =====
  ctx.fillStyle='#0c0f15';
  ctx.fillRect(0,0,VW,16);
  const fOff = (dist*6) % 240;
  for (let i=-1;i<6;i++) {
    const x = i*240 - fOff + 60;
    const buzz = Math.random() > 0.03;
    ctx.fillStyle = buzz ? '#e8f0ff' : '#3a4252';
    rr(x, 10, 110, 8, 3);
    if (buzz) glow(GLOW.white, x+55, 16, 60, 0.18);
  }

  // ===== floor =====
  const fg = ctx.createLinearGradient(0,GROUND,0,VH);
  fg.addColorStop(0,'#1d222c');
  fg.addColorStop(1,'#0b0d12');
  ctx.fillStyle=fg;
  ctx.fillRect(0,GROUND,VW,VH-GROUND);
  // tile lines scrolling
  const tOff = (dist*9) % 90;
  ctx.strokeStyle='rgba(120,140,170,0.12)';
  ctx.lineWidth=2;
  ctx.beginPath();
  for (let i=-1;i<13;i++) {
    const x = i*90 - tOff;
    ctx.moveTo(x, GROUND); ctx.lineTo(x-30, VH);
  }
  ctx.stroke();
  ctx.fillStyle='rgba(150,180,230,0.05)';
  ctx.fillRect(0,GROUND,VW,18);
  // taped-down cables on floor
  const cOff = (dist*9) % 320;
  ctx.strokeStyle='rgba(30,30,36,0.9)';
  ctx.lineWidth=4;
  for (let i=-1;i<5;i++) {
    const x = i*320 - cOff + 100;
    ctx.beginPath();
    ctx.moveTo(x, GROUND+30);
    ctx.quadraticCurveTo(x+40, GROUND+20, x+80, GROUND+34);
    ctx.stroke();
  }
}

function drawPlaid(x,y,w,h) {
  ctx.fillStyle='#a32c2c';
  ctx.fillRect(x,y,w,h);
  ctx.fillStyle='rgba(40,20,30,0.55)';
  for (let i=0;i<w;i+=12) ctx.fillRect(x+i,y,5,h);
  for (let j=0;j<h;j+=12) ctx.fillRect(x,y+j,w,5);
  ctx.fillStyle='rgba(240,200,120,0.25)';
  for (let i=8;i<w;i+=12) ctx.fillRect(x+i,y,2,h);
  for (let j=8;j<h;j+=12) ctx.fillRect(x,y+j,w,2);
}

function drawRobert() {
  const x = robert.x, y = robert.y;
  const stumbling = robert.stumble > 0;
  const flicker = stumbling && Math.floor(t/4)%2===0;
  const run = robert.onGround && !robert.duck;
  const c1 = Math.sin(t*0.55), c2 = Math.sin(t*0.55+Math.PI);
  ctx.save();
  ctx.translate(x, y);
  if (stumbling) ctx.rotate(Math.sin(t*0.5)*0.08);
  if (flicker) ctx.globalAlpha = 0.55;

  if (robert.duck) {
    // crouched ball of a man
    ctx.fillStyle='#7d8794'; // khakis
    rr(-14, -16, 28, 16, 5);
    ctx.fillStyle='#2b2f3a'; // nerdy tee
    ctx.beginPath(); ctx.ellipse(0, -22, 18, 14, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffd05a';
    ctx.save();
    ctx.translate(0,-22);
    ctx.beginPath();
    ctx.moveTo(0,-5);
    ctx.quadraticCurveTo(1.3,-1.3, 5,0);
    ctx.quadraticCurveTo(1.3,1.3, 0,5);
    ctx.quadraticCurveTo(-1.3,1.3, -5,0);
    ctx.quadraticCurveTo(-1.3,-1.3, 0,-5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
    // head poking forward
    ctx.fillStyle='#e8c39e';
    ctx.beginPath(); ctx.arc(14, -30, 9, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,235,210,0.5)'; // bald shine
    ctx.beginPath(); ctx.arc(12, -34, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#b9bec6'; // beard
    ctx.beginPath(); ctx.arc(16, -25, 6, 0, Math.PI); ctx.fill();
    // glasses
    ctx.strokeStyle='#222'; ctx.lineWidth=1.5;
    ctx.strokeRect(14,-33,6,5); ctx.strokeRect(8,-33,5,5);
  } else {
    // legs (stubby, fast little steps)
    const l1 = run ? c1*10 : 4, l2 = run ? c2*10 : -4;
    ctx.fillStyle='#7d8794';
    rr(-10+l1*0.5, -22, 9, 23, 4);
    rr(2+l2*0.5, -22, 9, 23, 4);
    ctx.fillStyle='#3a2c1e'; // shoes
    rr(-11+l1*0.5, -5, 12, 6, 2);
    rr(1+l2*0.5, -5, 12, 6, 2);

    // big belly torso — nerdy graphic tee, slightly snug
    const sg = ctx.createLinearGradient(-18,-58,18,-20);
    sg.addColorStop(0,'#343948'); sg.addColorStop(1,'#23262f');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.ellipse(0, -38, 19, 21, 0, 0, Math.PI*2); ctx.fill();
    // tee graphic: original gold command-star emblem (sci-fi fleet badge)
    ctx.save();
    ctx.translate(1, -38);
    ctx.fillStyle='#ffd05a';
    ctx.beginPath();
    ctx.moveTo(0,-9);
    ctx.quadraticCurveTo(2.2,-2.2, 9,0);
    ctx.quadraticCurveTo(2.2,2.2, 0,9);
    ctx.quadraticCurveTo(-2.2,2.2, -9,0);
    ctx.quadraticCurveTo(-2.2,-2.2, 0,-9);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#23262f';
    ctx.beginPath(); ctx.arc(0,0,2.2,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle='rgba(255,208,90,0.7)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(0,0,11,0,Math.PI*2); ctx.stroke();
    ctx.restore();
    // ID badge clipped to hem
    ctx.fillStyle='#e8e8e8';
    ctx.fillRect(-14, -28, 8, 10);
    ctx.fillStyle='#3a414c';
    ctx.fillRect(-13, -26, 6, 4);

    // pumping arms — short sleeves, bare forearms
    const teeCol='#2b2f3a';
    ctx.fillStyle=teeCol;
    rr(-20, -52 + c2*3, 10, 10, 5);
    rr(10, -52 + c1*3, 10, 10, 5);
    ctx.fillStyle='#e8c39e';
    rr(-19, -44 + c2*3, 8, 12, 4);
    rr(11, -44 + c1*3, 8, 12, 4);
    ctx.beginPath(); ctx.arc(-15, -31+c2*3, 4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(15, -31+c1*3, 4, 0, Math.PI*2); ctx.fill();

    // head: bald, beard, glasses
    ctx.fillStyle='#e8c39e';
    ctx.beginPath(); ctx.arc(6, -68, 11, 0, Math.PI*2); ctx.fill();
    // bald shine
    ctx.fillStyle='rgba(255,238,215,0.6)';
    ctx.beginPath(); ctx.arc(4, -74, 3.5, 0, Math.PI*2); ctx.fill();
    // gray fringe
    ctx.fillStyle='#b9bec6';
    ctx.beginPath(); ctx.arc(-1, -64, 8, Math.PI*0.7, Math.PI*1.6); ctx.lineTo(-1,-64); ctx.fill();
    // beard
    ctx.fillStyle='#c3c8cf';
    ctx.beginPath(); ctx.arc(8, -62, 8, -0.2, Math.PI*1.05); ctx.fill();
    // glasses
    ctx.strokeStyle='#1c1c1c'; ctx.lineWidth=2;
    ctx.strokeRect(7, -72, 8, 6);
    ctx.strokeRect(-2, -72, 7, 6);
    ctx.beginPath(); ctx.moveTo(5,-69); ctx.lineTo(7,-69); ctx.stroke();
    // lens glint
    ctx.fillStyle='rgba(180,220,255,0.5)';
    ctx.fillRect(9,-71,3,2);
    // sweat when boss close
    if (boss.lead < 110 && t%14<7) {
      ctx.fillStyle='#9fdcff';
      ctx.beginPath(); ctx.arc(-6, -74, 2, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawBoss(grabbing) {
  const bx = robert.x - 70 - boss.lead + (grabbing ? caughtAnim*1.2 : 0);
  const by = GROUND;
  const lum = Math.sin(t*0.32); // lumbering bob
  ctx.save();
  ctx.translate(bx, by + Math.abs(lum)*-4);

  const S = 1.9; // boss scale vs robert
  ctx.scale(S, S);

  // legs - dark jeans
  const c1=Math.sin(t*0.32), c2=Math.sin(t*0.32+Math.PI);
  ctx.fillStyle='#27303f';
  rr(-12+c1*5, -26, 11, 27, 4);
  rr(1+c2*5, -26, 11, 27, 4);
  ctx.fillStyle='#1a1410';
  rr(-13+c1*5, -5, 14, 6, 2);
  rr(0+c2*5, -5, 14, 6, 2);

  // plaid torso (broad)
  drawPlaid(-19, -62, 38, 38);
  ctx.strokeStyle='rgba(0,0,0,0.35)';
  ctx.lineWidth=1.5;
  ctx.strokeRect(-19,-62,38,38);
  // collar
  ctx.fillStyle='#7d1f1f';
  ctx.beginPath(); ctx.moveTo(-6,-62); ctx.lineTo(0,-55); ctx.lineTo(6,-62); ctx.closePath(); ctx.fill();

  // reaching arms (extend as he closes in)
  const reach = boss.arm * 14 + (grabbing ? caughtAnim*0.3 : 0);
  ctx.save();
  ctx.rotate(-0.25 - boss.arm*0.25);
  drawPlaid(8, -60, 26 + reach, 10);
  ctx.fillStyle='#e0b894';
  ctx.beginPath(); ctx.arc(36 + reach, -55, 6, 0, Math.PI*2); ctx.fill();
  // grasping fingers
  ctx.strokeStyle='#e0b894'; ctx.lineWidth=3;
  ctx.beginPath();
  ctx.moveTo(38+reach,-58); ctx.lineTo(43+reach,-60);
  ctx.moveTo(39+reach,-54); ctx.lineTo(45+reach,-54);
  ctx.moveTo(38+reach,-51); ctx.lineTo(43+reach,-48);
  ctx.stroke();
  ctx.restore();
  // back arm
  ctx.save();
  ctx.rotate(0.3);
  drawPlaid(-26, -58, 20, 9);
  ctx.restore();

  // head
  ctx.fillStyle='#e0b894';
  rr(-10, -84, 22, 22, 6);
  // slicked-back hair with shine
  ctx.fillStyle='#171310';
  ctx.beginPath();
  ctx.moveTo(-10,-80);
  ctx.quadraticCurveTo(0,-92,14,-82);
  ctx.lineTo(12,-77);
  ctx.quadraticCurveTo(2,-84,-10,-76);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(120,140,170,0.45)'; // grease shine
  ctx.beginPath(); ctx.ellipse(2,-84,7,2,-0.15,0,Math.PI*2); ctx.fill();
  // sideburns
  ctx.fillStyle='#171310';
  ctx.fillRect(-10,-78,4,12);
  ctx.fillRect(8,-78,4,12);
  // angry brows + eyes
  ctx.strokeStyle='#171310'; ctx.lineWidth=2.5;
  ctx.beginPath();
  ctx.moveTo(-5,-76); ctx.lineTo(1,-73);
  ctx.moveTo(10,-76); ctx.lineTo(4,-73);
  ctx.stroke();
  ctx.fillStyle = boss.lead < 90 ? '#d42b2b' : '#2a2a2a';
  ctx.fillRect(-3,-72,3,3);
  ctx.fillRect(5,-72,3,3);
  if (boss.lead < 90) glow(GLOW.red, bx+2*S, by-72*S, 14, 0.4);
  // shouting mouth
  ctx.fillStyle='#5e1414';
  if (boss.yell>0 || grabbing) { ctx.beginPath(); ctx.ellipse(2,-65,5,4,0,0,Math.PI*2); ctx.fill(); }
  else ctx.fillRect(-3,-66,9,2.5);
  // red angry flush
  ctx.fillStyle='rgba(220,60,50,0.18)';
  rr(-10,-84,22,22,6);

  ctx.restore();

  // yell bubble
  if (boss.yell > 0 && state==='play') {
    const a = Math.min(1, boss.yell/20);
    ctx.globalAlpha = a;
    ctx.font='800 22px "Segoe UI", system-ui, sans-serif';
    const w = ctx.measureText(yellTxt).width;
    ctx.fillStyle='rgba(255,250,240,0.95)';
    rr(bx-w/2-14, by-225, w+28, 38, 10);
    ctx.beginPath();
    ctx.moveTo(bx-8, by-187); ctx.lineTo(bx+10, by-187); ctx.lineTo(bx, by-172);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#a32020';
    ctx.textAlign='center';
    ctx.fillText(yellTxt, bx, by-198);
    ctx.textAlign='left';
    ctx.globalAlpha = 1;
  }
  // stomp dust
  if (state==='play' && Math.abs(lum) > 0.96) {
    boomP(bx+ (Math.random()-0.5)*30, GROUND, 3, '#6a7280', 1.2);
    if (boss.lead < 140) shake = Math.max(shake, 2.5);
  }
}

function drawObstacle(o) {
  ctx.save();
  ctx.translate(o.x, 0);
  if (o.type==='chair') {
    ctx.translate(0, GROUND);
    ctx.rotate(o.roll*0.15);
    ctx.fillStyle='#23272e';
    ctx.beginPath(); ctx.arc(-12,-6,6,0,Math.PI*2); ctx.arc(12,-6,6,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#3a414c';
    ctx.fillRect(-3,-26,6,20);
    ctx.fillStyle='#2c3d5c';
    rr(-18,-34,36,10,4);
    rr(-18,-54,12,24,4);
    ctx.restore();
    return;
  }
  if (o.type==='rack') {
    ctx.fillStyle='#1b2029';
    rr(-28, GROUND-78, 56, 78, 4);
    ctx.fillStyle='#0e1117';
    for (let u=0;u<4;u++) ctx.fillRect(-23, GROUND-72+u*18, 46, 13);
    for (let u=0;u<4;u++) {
      const on = Math.sin(t*0.12+u*2+o.x*0.01)>0.2;
      ctx.fillStyle = on ? '#52ff86':'#163522';
      ctx.fillRect(-18, GROUND-68+u*18, 4, 4);
      ctx.fillStyle='#ffb340';
      ctx.fillRect(-10, GROUND-68+u*18, 4, 4);
    }
    // wheels
    ctx.fillStyle='#0a0c10';
    ctx.beginPath(); ctx.arc(-18,GROUND-3,5,0,Math.PI*2); ctx.arc(18,GROUND-3,5,0,Math.PI*2); ctx.fill();
  } else if (o.type==='tapes') {
    const cols=['#8a3030','#30508a','#3a7a40'];
    for (let u=0;u<3;u++) {
      ctx.fillStyle=cols[u];
      rr(-17+(u%2)*4, GROUND-13-u*12, 34, 11, 2);
      ctx.fillStyle='rgba(255,255,255,0.7)';
      ctx.fillRect(-12+(u%2)*4, GROUND-10-u*12, 14, 4);
    }
  } else if (o.type==='boom') {
    // hanging cable tray / boom mic from ceiling
    ctx.fillStyle='#23282f';
    ctx.fillRect(-4, 0, 8, o.h-30);
    ctx.fillStyle='#2e343d';
    rr(-45, o.h-34, 90, 16, 4);
    // dangling cables
    ctx.strokeStyle='#15181d'; ctx.lineWidth=3;
    for (let u=-1;u<2;u++) {
      ctx.beginPath();
      ctx.moveTo(u*24, o.h-18);
      ctx.quadraticCurveTo(u*24+6, o.h-4+Math.sin(t*0.1+u)*3, u*24, o.h+8+Math.sin(t*0.08+u)*4);
      ctx.stroke();
    }
    // warning light
    const on = Math.floor(t/20)%2===0;
    ctx.fillStyle = on ? '#ffb340' : '#5c4318';
    ctx.beginPath(); ctx.arc(0, o.h-26, 4, 0, Math.PI*2); ctx.fill();
    if (on) glow(GLOW.amber, o.x, o.h-26, 12, 0.6);
  } else if (o.type==='spill') {
    ctx.fillStyle='rgba(94,62,32,0.85)';
    ctx.beginPath(); ctx.ellipse(0, GROUND+4, 32, 7, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(160,200,235,0.15)';
    ctx.beginPath(); ctx.ellipse(-6, GROUND+2, 14, 3, 0, 0, Math.PI*2); ctx.fill();
    // tipped cup
    ctx.fillStyle='#e8e2d8';
    ctx.save(); ctx.translate(20, GROUND-4); ctx.rotate(1.2);
    rr(-6,-9,12,16,3); ctx.restore();
  }
  ctx.restore();
}

function drawPickup(p) {
  const bob = Math.sin(p.t*0.1)*4;
  if (p.type==='coffee') {
    glow(GLOW.amber, p.x, p.y+bob-8, 18, 0.6);
    ctx.fillStyle='#f2ece2';
    rr(p.x-8, p.y+bob-16, 16, 18, 3);
    ctx.fillStyle='#5e3b1e';
    rr(p.x-6, p.y+bob-14, 12, 4, 2);
    ctx.strokeStyle='#f2ece2'; ctx.lineWidth=2.5;
    ctx.beginPath(); ctx.arc(p.x+10, p.y+bob-7, 5, -1.2, 1.2); ctx.stroke();
    // steam
    ctx.strokeStyle='rgba(255,255,255,0.35)'; ctx.lineWidth=1.5;
    ctx.beginPath();
    ctx.moveTo(p.x, p.y+bob-18);
    ctx.quadraticCurveTo(p.x+3, p.y+bob-24, p.x, p.y+bob-29);
    ctx.stroke();
  } else {
    glow(GLOW.red, p.x, p.y+bob-6, 14, 0.3);
    ctx.fillStyle='#d98a4b';
    ctx.beginPath(); ctx.arc(p.x, p.y+bob-6, 10, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle='#f06292';
    ctx.beginPath(); ctx.arc(p.x, p.y+bob-6, 10, Math.PI, Math.PI*2); ctx.fill();
    ctx.fillStyle='#1d222c';
    ctx.beginPath(); ctx.arc(p.x, p.y+bob-6, 3.5, 0, Math.PI*2); ctx.fill();
    // sprinkles
    ctx.fillStyle='#fff';
    ctx.fillRect(p.x-6, p.y+bob-12, 2, 1.5);
    ctx.fillRect(p.x+3, p.y+bob-14, 2, 1.5);
  }
}

function drawHUD() {
  // distance + donuts
  ctx.fillStyle='rgba(8,10,18,0.65)';
  rr(14,14,210,30,8);
  ctx.font='700 17px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle='#ffd27a';
  ctx.fillText(Math.floor(dist) + 'm', 26, 36);
  ctx.fillStyle='#f06292';
  ctx.fillText('🍩 ' + donuts, 110, 36);
  ctx.fillStyle='rgba(170,200,235,0.5)';
  ctx.font='600 11px "Segoe UI", system-ui, sans-serif';
  ctx.fillText('RUN ROBERT RUN!', 18, 58);

  // boss proximity meter
  const bw=180;
  ctx.fillStyle='rgba(8,10,18,0.65)';
  rr(VW-bw-86, 14, bw+72, 30, 8);
  ctx.font='700 12px "Segoe UI", system-ui, sans-serif';
  ctx.fillStyle='#ff7a6a';
  ctx.fillText('BOSS', VW-bw-74, 34);
  const danger = 1 - Math.min(1, boss.lead/250);
  const mg = ctx.createLinearGradient(VW-bw-34,0,VW-34,0);
  mg.addColorStop(0,'#52ff86'); mg.addColorStop(0.6,'#ffb340'); mg.addColorStop(1,'#ff4040');
  ctx.fillStyle='rgba(255,255,255,0.08)';
  rr(VW-bw-34, 21, bw, 16, 5);
  ctx.save();
  ctx.beginPath();
  if (ctx.roundRect) ctx.roundRect(VW-bw-34, 21, bw*danger, 16, 5); else ctx.rect(VW-bw-34,21,bw*danger,16);
  ctx.clip();
  ctx.fillStyle=mg;
  ctx.fillRect(VW-bw-34,21,bw,16);
  ctx.restore();
  if (danger > 0.72 && Math.floor(t/12)%2===0) {
    glow(GLOW.red, VW-34-bw*0.1, 29, 24, 0.5);
  }
}

function vignette() {
  const vg = ctx.createRadialGradient(VW/2,VH/2,VH*0.45, VW/2,VH/2,VH*0.85);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,0.5)');
  ctx.fillStyle=vg;
  ctx.fillRect(0,0,VW,VH);
  if (flash>0) {
    ctx.fillStyle=`rgba(255,120,60,${flash*0.3})`;
    ctx.fillRect(0,0,VW,VH);
  }
}

function centerText(lines, startY) {
  ctx.textAlign='center';
  let y = startY;
  lines.forEach(([txt,size,col,glowCol])=>{
    ctx.font='800 '+size+'px "Segoe UI", system-ui, sans-serif';
    if (glowCol) { ctx.shadowColor=glowCol; ctx.shadowBlur=24; }
    ctx.fillStyle=col;
    ctx.fillText(txt, VW/2, y);
    ctx.shadowBlur=0;
    y += size+14;
  });
  ctx.textAlign='left';
}

function draw() {
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#000';
  ctx.fillRect(0,0,cv.width,cv.height);
  const sx = shake>0.5 ? (Math.random()-0.5)*shake : 0;
  const sy = shake>0.5 ? (Math.random()-0.5)*shake : 0;
  ctx.setTransform(scale,0,0,scale, offX+sx*scale, offY+sy*scale);

  drawRoom();

  if (state==='play' || state==='over') {
    obstacles.forEach(drawObstacle);
    pickups.forEach(drawPickup);
    drawBoss(state==='over');
    if (state==='play' || caughtAnim<30) drawRobert();
    parts.forEach(p=>{
      const a = Math.min(1, p.life/p.max*1.6);
      ctx.globalAlpha=a;
      ctx.fillStyle=p.col;
      ctx.fillRect(p.x,p.y,p.sz,p.sz);
      ctx.globalAlpha=1;
    });
    drawHUD();
  }

  vignette();

  if (state==='title') {
    ctx.fillStyle='rgba(3,4,9,0.55)';
    ctx.fillRect(0,0,VW,VH);
    const pulse = 0.6+Math.sin(t*0.08)*0.4;
    centerText([
      ['RUN ROBERT RUN!', 58, '#ffd27a', 'rgba(255,180,60,0.9)'],
      ['', 6, '#000', null],
      ['The boss saw the discrepancy report.', 17, '#9fb0c4', null],
      ['Master Control is no place to hide.', 15, '#7a8aa0', null],
    ], 190);
    ctx.globalAlpha=pulse;
    centerText([['— TAP OR PRESS ENTER TO RUN —', 18, '#8fe8ff', 'rgba(110,210,255,0.8)']], 370);
    ctx.globalAlpha=1;
    centerText([['JUMP (double-tap = double jump)    DUCK under booms    Coffee = speed burst', 13, '#65788f', null]], 425);
  }

  if (state==='over') {
    ctx.fillStyle='rgba(18,4,2,0.5)';
    ctx.fillRect(0,0,VW,VH);
    if (caughtAnim > 25) {
      const pulse = 0.6+Math.sin(t*0.08)*0.4;
      centerText([
        ['CAUGHT!', 56, '#ff4d5e', 'rgba(255,50,60,0.9)'],
        ['"My office. NOW."', 19, '#ffd27a', null],
        ['', 4, '#000', null],
        ['DISTANCE  ' + Math.floor(dist) + 'm     🍩 ' + donuts, 21, '#e8eef8', null],
        ['SCORE  ' + (Math.floor(dist)+donuts*10) + '     BEST  ' + best, 16, '#9fb0c4', null],
      ], 180);
      ctx.globalAlpha=pulse;
      centerText([['— TAP TO RUN AGAIN —', 18, '#8fe8ff', 'rgba(110,210,255,0.8)']], 400);
      ctx.globalAlpha=1;
    }
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
})();
</script>
</body>
</html>
